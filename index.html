<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flow · Basic Telecom</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Playfair+Display:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
--f:'Plus Jakarta Sans',sans-serif;
--fser:'Playfair Display',serif;
--mono:'DM Mono',monospace;
--brand-blue:#2C4E7A;
--brand-red:#D42B2B;
--brand-gray:#8A8FA8;
--bg:#F8F7FF;
--s0:#FFFFFF;
--s1:#F2F1FA;
--s2:#EAE8F8;
--b:#E3E1F0;
--b2:#D0CDED;
--ink:#1A1828;
--ink2:#3D3B52;
--ink3:#8A8FA8;
--ink4:#C4C2D8;
--ac:#2C4E7A;
--ac2:#3A64A0;
--ac3:#EDF2F9;
--green:#0E9057;--green-bg:#E8F8F1;
--amber:#B86A00;--amber-bg:#FEF5E6;
--red:#C42828;--red-bg:#FEF0F0;
--purple:#6340C8;--purple-bg:#F0ECFF;
--r:10px;--rlg:16px;--rxl:22px;
--sh:0 1px 4px rgba(44,78,122,.07),0 1px 2px rgba(0,0,0,.04);
--shlg:0 6px 28px rgba(44,78,122,.13),0 2px 8px rgba(0,0,0,.05);
--shxl:0 20px 60px rgba(44,78,122,.18),0 4px 16px rgba(0,0,0,.07);
--topbar-h:62px;
--nav-h:46px;
}
[data-theme="dark"]{
--bg:#0E0D18;--s0:#161528;--s1:#1E1C30;--s2:#252340;
--b:#2D2B48;--b2:#3A3860;
--ink:#F0EFF8;--ink2:#B8B6D0;--ink3:#6E6C88;--ink4:#3A3858;
--ac:#4E7AB8;--ac2:#6090D0;--ac3:#1A2540;
--green:#1DB974;--green-bg:#0A2A1A;
--amber:#F0A030;--amber-bg:#281A00;
--red:#F05050;--red-bg:#280A0A;
--purple:#9B78F0;--purple-bg:#1A1040;
--sh:0 1px 4px rgba(0,0,0,.3);
--shlg:0 6px 28px rgba(0,0,0,.4);
--shxl:0 20px 60px rgba(0,0,0,.5);
}
body{font-family:var(--f);background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.5;transition:background .3s,color .3s}
.topbar{height:var(--topbar-h);background:var(--brand-blue);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:200;}
[data-theme="dark"] .topbar{background:#0A0E1A;border-bottom:1px solid var(--b)}
.brand{display:flex;align-items:center;gap:12px}
.brand-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;font-family:var(--fser)}
.brand-divider{width:1px;height:28px;background:rgba(255,255,255,.2)}
.brand-app{font-size:13px;font-weight:500;color:rgba(255,255,255,.75);letter-spacing:.06em;text-transform:uppercase}
.tbtn{height:34px;padding:0 15px;border-radius:40px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:rgba(255,255,255,.9);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .16s;display:flex;align-items:center;gap:6px;backdrop-filter:blur(8px);}
.tbtn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}
.tbtn-w{background:rgba(255,255,255,.95);color:var(--brand-blue);border-color:transparent}
.tbtn-w:hover{background:#fff}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .16s;}
.theme-btn:hover{background:rgba(255,255,255,.2)}
.top-actions{display:flex;align-items:center;gap:8px}
.bases-bar{height:var(--nav-h);background:var(--s0);border-bottom:1px solid var(--b);display:flex;align-items:flex-end;padding:0 26px;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--topbar-h);z-index:100;transition:background .3s;}
.bases-bar::-webkit-scrollbar{display:none}
.btab{display:flex;align-items:center;gap:7px;padding:11px 15px 10px;border-bottom:2.5px solid transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink3);white-space:nowrap;transition:all .16s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--f);}
.btab:hover{color:var(--ink);background:var(--s1)}
.btab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:700}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:transform .15s}
.btab.on .bdot{transform:scale(1.25)}
.bct{font-size:10px;font-weight:700;font-family:var(--mono);background:var(--s1);color:var(--ink3);padding:1px 6px;border-radius:20px}
.btab.on .bct{background:var(--ac3);color:var(--ac)}
.badd{align-self:center;margin-left:6px;height:26px;padding:0 11px;border-radius:40px;border:1.5px dashed var(--b2);background:transparent;color:var(--ink3);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .16s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.badd:hover{border-color:var(--ac);color:var(--ac);background:var(--ac3)}
.toolbar{background:var(--s0);border-bottom:1px solid var(--b);padding:9px 26px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;transition:background .3s;}
.srch-w{position:relative;flex:1;min-width:170px;max-width:270px}
.srch-w input{width:100%;height:33px;padding:0 10px 0 32px;border:1px solid var(--b);border-radius:40px;font-size:12px;background:var(--s1);color:var(--ink);font-family:var(--f);outline:none;transition:all .16s;}
.srch-w input:focus{border-color:var(--ac);background:var(--s0);box-shadow:0 0 0 3px rgba(44,78,122,.1)}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:13px}
.fsel{height:33px;padding:0 11px;border:1px solid var(--b);border-radius:40px;font-size:12px;background:var(--s0);color:var(--ink);font-family:var(--f);cursor:pointer;outline:none;transition:border-color .15s;}
.fsel:focus{border-color:var(--ac)}
.vpills{display:flex;background:var(--s1);border-radius:40px;padding:3px;gap:2px;margin-left:auto}
.vp{height:27px;padding:0 12px;border-radius:40px;border:none;background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:var(--ink3);font-family:var(--f);transition:all .14s;display:flex;align-items:center;gap:5px}
.vp.on{background:var(--s0);color:var(--ink);box-shadow:var(--sh)}
.tstats{display:flex;gap:12px;padding-left:10px;border-left:1px solid var(--b)}
.tst{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:4px}
.tst strong{font-size:12px;font-weight:700;color:var(--ink)}
.main{padding:22px 26px}
.scards{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.sc{background:var(--s0);border:1px solid var(--b);border-radius:var(--rlg);padding:17px 18px;transition:box-shadow .18s,background .3s;position:relative;overflow:hidden;}
.sc:hover{box-shadow:var(--shlg)}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--rlg) var(--rlg)}
.sc.c-blue::after{background:var(--brand-blue)}
.sc.c-green::after{background:var(--green)}
.sc.c-amber::after{background:var(--amber)}
.sc.c-red::after{background:var(--red)}
.sc-n{font-size:32px;font-weight:700;line-height:1;margin-bottom:4px;font-family:var(--mono)}
.sc-n.nb{color:var(--brand-blue)}.sc-n.ng{color:var(--green)}.sc-n.na{color:var(--amber)}.sc-n.nr{color:var(--red)}
.sc-l{font-size:11px;color:var(--ink3);font-weight:500}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;align-items:start}
.kol{background:var(--s1);border:1px solid var(--b);border-radius:var(--rlg);padding:12px;transition:background .3s}
.kol-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.kname{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.05em;text-transform:uppercase}
.kdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:5px}
.kcnt{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--ink3);background:var(--s0);padding:1px 7px;border-radius:20px;border:1px solid var(--b)}
.kplus{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--b2);background:var(--s0);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink3);transition:all .14s}
.kplus:hover{background:var(--ac);border-color:var(--ac);color:#fff}
.kcards{display:flex;flex-direction:column;gap:8px;min-height:40px}
.card{background:var(--s0);border:1px solid var(--b);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .18s;position:relative;animation:cin .24s cubic-bezier(.16,1,.3,1) both;}
@keyframes cin{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--ac2);box-shadow:var(--shlg);transform:translateY(-2px)}
.card-hd{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.card-title{font-size:13px;font-weight:500;line-height:1.45;color:var(--ink);flex:1}
.cacts{display:flex;gap:2px;opacity:0;transition:opacity .14s}
.card:hover .cacts{opacity:1}
.ca{width:22px;height:22px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);transition:all .12s}
.ca:hover{background:var(--s1);color:var(--ink)}
.card-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.chip{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.cha{background:#FEE2E2;color:#9B1C1C}
.chm{background:#FEF3C7;color:#78350F}
.chb{background:#D1FAE5;color:#064E3B}
.card-ft{display:flex;align-items:center;justify-content:space-between;gap:6px}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0;font-family:var(--mono)}
.cperson{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink2)}
.cdue{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;font-family:var(--mono)}
.dok{background:#D1FAE5;color:#064E3B}.dsoon{background:#FEF3C7;color:#78350F}.dlate{background:#FEE2E2;color:#9B1C1C}
.cnotes{font-size:11px;color:var(--ink2);line-height:1.55;border-top:1px solid var(--s1);padding-top:8px;margin-top:8px}
.ccomm{font-size:10px;color:var(--ink3);background:var(--s1);padding:2px 7px;border-radius:20px;font-weight:600;font-family:var(--mono)}
.empty-kol{padding:18px 0;text-align:center;font-size:11px;color:var(--ink4)}
.lwrap{background:var(--s0);border:1px solid var(--b);border-radius:var(--rlg);overflow:hidden;margin-bottom:14px;transition:background .3s}
.lhd{display:grid;grid-template-columns:2fr 90px 150px 140px 100px 60px;padding:0 17px;height:35px;align-items:center;background:var(--s1);border-bottom:1px solid var(--b)}
.lhd span{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em}
.lrow{display:grid;grid-template-columns:2fr 90px 150px 140px 100px 60px;padding:0 17px;height:46px;align-items:center;border-bottom:1px solid var(--s1);cursor:pointer;transition:background .12s;animation:cin .2s ease both}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--ac3)}
.ltitle{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:10px}
.spill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.stodo{background:var(--s1);color:var(--ink3)}
.sdoing{background:var(--ac3);color:var(--ac)}
.sreview{background:#EDECFF;color:#4C3DB5}
.sdone{background:#D1FAE5;color:#064E3B}
.sblocked{background:#FEE2E2;color:#9B1C1C}
.grp-blk{margin-bottom:14px}
.grp-hdr{display:flex;align-items:center;gap:8px;padding:9px 15px;background:var(--s0);border:1px solid var(--b);border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;transition:background .13s}
.grp-hdr:hover{background:var(--s1)}
.gchev{font-size:10px;color:var(--ink3);transition:transform .2s}
.gchev.op{transform:rotate(90deg)}
.gname{font-size:13px;font-weight:700;color:var(--ink)}
.gcnt{font-size:10px;font-family:var(--mono);font-weight:700;background:var(--s1);color:var(--ink3);padding:1px 8px;border-radius:20px}
.grp-body{border:1px solid var(--b);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.ov{position:fixed;inset:0;background:rgba(10,12,28,.55);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.ov.open{display:flex;animation:fdin .18s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.mbox,.dpanel{background:var(--s0);border-radius:var(--rxl);max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shxl);animation:sup .22s cubic-bezier(.16,1,.3,1) both;transition:background .3s}
.mbox{width:520px}.dpanel{width:480px}
@keyframes sup{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
.mhd,.dphd{padding:22px 24px 15px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--s0);z-index:1;border-radius:var(--rxl) var(--rxl) 0 0;transition:background .3s}
.mtitle,.dptitle{font-family:var(--fser);font-size:20px;color:var(--ink);letter-spacing:-.2px;font-weight:500}
.dptitle{font-size:21px;margin-bottom:10px;line-height:1.3}
.mclose{width:30px;height:30px;border-radius:50%;border:1px solid var(--b);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink2);transition:all .13s}
.mclose:hover{background:var(--s1);color:var(--ink)}
.mbody,.dpbody{padding:20px 24px}
.fl{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:block}
.fi,.fs,.fta{width:100%;padding:9px 12px;border:1px solid var(--b);border-radius:var(--r);font-size:13px;font-family:var(--f);color:var(--ink);outline:none;background:var(--s0);transition:border-color .14s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(44,78,122,.09)}
.fta{resize:vertical;min-height:68px;line-height:1.6}
.frow{margin-bottom:14px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mft,.dpft{padding:14px 24px;border-top:1px solid var(--b);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--s0);border-radius:0 0 var(--rxl) var(--rxl);transition:background .3s}
.dpft{justify-content:flex-start}
.gbtn{height:36px;padding:0 17px;border-radius:40px;border:1px solid var(--b);background:var(--s0);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);font-family:var(--f);transition:all .14s}
.gbtn:hover{background:var(--s1)}
.gbtn-ac{background:var(--brand-blue);border-color:var(--brand-blue);color:#fff}
.gbtn-ac:hover{background:var(--ac2);border-color:var(--ac2)}
.gbtn-dl{color:var(--red);border-color:#FECACA}.gbtn-dl:hover{background:var(--red-bg)}
.dpbadges{display:flex;flex-wrap:wrap;gap:6px}
.dpsec{margin-bottom:16px}
.dpst{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.dprow{display:grid;grid-template-columns:110px 1fr;gap:8px;margin-bottom:7px;font-size:13px;align-items:start}
.dplbl{color:var(--ink3);font-size:12px;padding-top:1px}
.dpnote{background:var(--s1);border-radius:var(--r);padding:11px 13px;font-size:13px;line-height:1.65;color:var(--ink)}
.comms{display:flex;flex-direction:column;gap:7px}
.comm{background:var(--s1);border-radius:var(--r);padding:10px 12px;border-left:3px solid var(--brand-blue)}
.comm-au{font-size:11px;font-weight:700;color:var(--ink);margin-bottom:3px}
.comm-tx{font-size:12px;color:var(--ink2);line-height:1.55}
.comm-ti{font-size:10px;color:var(--ink3);margin-top:3px;font-family:var(--mono)}
.cadd{display:flex;gap:7px;margin-top:10px}
.cadd input{flex:1;padding:8px 12px;border:1px solid var(--b);border-radius:40px;font-size:12px;font-family:var(--f);outline:none;transition:border-color .14s;background:var(--s0);color:var(--ink)}
.cadd input:focus{border-color:var(--ac)}
.cbox{background:var(--s0);border-radius:var(--rxl);width:360px;padding:28px 24px;box-shadow:var(--shxl);text-align:center;animation:sup .2s ease both;transition:background .3s}
.cico{font-size:40px;margin-bottom:12px}
.ctitle{font-family:var(--fser);font-size:20px;margin-bottom:8px;color:var(--ink);font-weight:500}
.cdesc{font-size:13px;color:var(--ink2);line-height:1.65;margin-bottom:22px}
.nbbox{background:var(--s0);border-radius:var(--rxl);width:400px;max-width:95vw;padding:28px 24px;box-shadow:var(--shxl);animation:sup .2s ease both;transition:background .3s}
.nbtitle{font-family:var(--fser);font-size:21px;margin-bottom:20px;color:var(--ink);font-weight:500}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.copt{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .14s;border:3px solid transparent;outline:none}
.copt:hover{transform:scale(1.2)}
.copt.sel{border-color:var(--ink);transform:scale(1.15)}
.empty{text-align:center;padding:60px 24px}
.empty-ico{font-size:48px;margin-bottom:14px}
.empty-t{font-family:var(--fser);font-size:22px;margin-bottom:8px;color:var(--ink);font-weight:500}
.empty-d{font-size:14px;color:var(--ink2);margin-bottom:22px;line-height:1.7}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header class="topbar">
  <div class="brand">
    <span class="brand-name">Basic</span>
    <div class="brand-divider"></div>
    <span class="brand-app">Flow · Gestão</span>
  </div>
  <div class="top-actions">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Alternar tema">&#127769;</button>
    <button class="tbtn" onclick="openNewBase()">+ Nova base</button>
    <button class="tbtn tbtn-w" onclick="openNewTask(null)">+ Nova tarefa</button>
  </div>
</header>
<nav class="bases-bar" id="bases-bar"></nav>
<div class="toolbar">
  <div class="srch-w">
    <span class="srch-ico">&#128269;</span>
    <input type="text" id="srch" placeholder="Buscar tarefas..." oninput="applyF()">
  </div>
  <select class="fsel" id="fp" onchange="applyF()">
    <option value="">Todas prioridades</option>
    <option value="Alta">Alta</option>
    <option value="Media">Media</option>
    <option value="Baixa">Baixa</option>
  </select>
  <select class="fsel" id="fpe" onchange="applyF()">
    <option value="">Todos responsaveis</option>
  </select>
  <div class="vpills">
    <button class="vp on" id="vp-k" onclick="setView('k')">Kanban</button>
    <button class="vp" id="vp-l" onclick="setView('l')">Lista</button>
  </div>
  <div class="tstats" id="tstats"></div>
</div>
<div class="main" id="main"></div>
<div class="ov" id="ov-task">
  <div class="mbox">
    <div class="mhd" style="display:flex;align-items:center;justify-content:space-between">
      <div class="mtitle" id="mtitle">Nova tarefa</div>
      <button class="mclose" onclick="closeOv('ov-task')">&#10005;</button>
    </div>
    <div class="mbody">
      <div class="frow"><label class="fl">Titulo</label><input class="fi" id="t-ti" placeholder="Descreva a tarefa..."></div>
      <div class="fgrid">
        <div class="frow"><label class="fl">Status</label><select class="fs" id="t-st"><option>A fazer</option><option>Em andamento</option><option>Em revisao</option><option>Concluido</option><option>Bloqueado</option></select></div>
        <div class="frow"><label class="fl">Prioridade</label><select class="fs" id="t-pr"><option>Alta</option><option selected>Media</option><option>Baixa</option></select></div>
      </div>
      <div class="fgrid">
        <div class="frow"><label class="fl">Responsavel</label><input class="fi" id="t-pe" placeholder="Nome..."></div>
        <div class="frow"><label class="fl">Prazo</label><input class="fi" type="date" id="t-du"></div>
      </div>
      <div class="frow"><label class="fl">Grupo / Area</label><input class="fi" id="t-gr" placeholder="Ex: Operacoes, RH..."></div>
      <div class="frow"><label class="fl">Anotacoes</label><textarea class="fta" id="t-no" placeholder="Contexto, links, observacoes..."></textarea></div>
    </div>
    <div class="mft">
      <button class="gbtn" onclick="closeOv('ov-task')">Cancelar</button>
      <button class="gbtn gbtn-ac" onclick="saveTask()">Salvar tarefa</button>
    </div>
  </div>
</div>
<div class="ov" id="ov-detail"><div class="dpanel" id="dpanel"></div></div>
<div class="ov" id="ov-confirm">
  <div class="cbox">
    <div class="cico">&#128465;</div>
    <div class="ctitle">Excluir tarefa?</div>
    <div class="cdesc">Essa acao e permanente. A tarefa e todos os comentarios serao removidos.</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="gbtn" onclick="closeOv('ov-confirm')">Cancelar</button>
      <button class="gbtn gbtn-ac" style="background:#C42828;border-color:#C42828" onclick="doDelete()">Excluir</button>
    </div>
  </div>
</div>
<div class="ov" id="ov-newbase">
  <div class="nbbox">
    <div class="nbtitle">Nova base</div>
    <div class="frow"><label class="fl">Nome</label><input class="fi" id="nb-name" placeholder="Ex: Santos, Londrina..."></div>
    <div class="frow"><label class="fl">Cor da base</label><div class="cpick" id="cpick"></div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
      <button class="gbtn" onclick="closeOv('ov-newbase')">Cancelar</button>
      <button class="gbtn gbtn-ac" onclick="createBase()">Criar base</button>
    </div>
  </div>
</div>
<script>
var DB={bases:[],tasks:[]},curBase=null,curView='k',editId=null,delId=null,selColor='#2C4E7A';
var STATUSES=['A fazer','Em andamento','Em revisao','Concluido','Bloqueado'];
var STCLS={'A fazer':'stodo','Em andamento':'sdoing','Em revisao':'sreview','Concluido':'sdone','Bloqueado':'sblocked'};
var STCOL={'A fazer':'#9090A8','Em andamento':'#2C4E7A','Em revisao':'#6340C8','Concluido':'#0E9057','Bloqueado':'#C42828'};
var BCOLORS=['#2C4E7A','#D42B2B','#0E9057','#B86A00','#6340C8','#0891B2','#C2185B','#455A64','#0D7377','#E64A19','#1565C0','#558B2F'];
var AVCOLORS=['#2C4E7A','#D42B2B','#0E9057','#B86A00','#6340C8','#0891B2'];
function load(){try{var d=localStorage.getItem('flow_bt_v1');if(d)DB=JSON.parse(d)}catch(e){}}
function save(){try{localStorage.setItem('flow_bt_v1',JSON.stringify(DB))}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return(s||''). toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function avc(n){if(!n)return'#8A8FA8';var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xFFFF;return AVCOLORS[h%AVCOLORS.length]}
function ini(n){if(!n)return'?';var p=n.trim().split(' ').filter(Boolean);return(p[0]&&p[0][0]||'')+( p[1]&&p[1][0]||'')} 
function dcls(d){if(!d)return'';var dd=new Date(d+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);var df=Math.ceil((dd-t)/86400000);return df<0?'dlate':df<=3?'dsoon':'dok'}
function dlbl(d){if(!d)return'';var dd=new Date(d+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);var df=Math.ceil((dd-t)/86400000);if(df<0)return'-'+Math.abs(df)+'d';if(df===0)return'Hoje';if(df===1)return'Amanha';return dd.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
function bTasks(bid){return DB.tasks.filter(function(t){return t.base===bid})}
function filtered(){
  var q=(document.getElementById('srch').value||''). toLowerCase();
  var fp=document.getElementById('fp').value||'';
  var fpe=document.getElementById('fpe').value||'';
  return bTasks(curBase).filter(function(t){return(!q||t.title.toLowerCase().includes(q)||(t.notes||''). toLowerCase().includes(q)||(t.person||''). toLowerCase().includes(q))&&(!fp||t.priority===fp)&&(!fpe||t.person===fpe)});
}
function applyF(){updPeo();render()}
function updPeo(){
  var s=document.getElementById('fpe');if(!s)return;
  var cur=s.value,pp=[...new Set(bTasks(curBase).map(function(t){return t.person}).filter(Boolean))].sort();
  s.innerHTML='<option value="">Todos responsaveis</option>'+pp.map(function(p){return'<option value="'+esc(p)+'"'+(p===cur?' selected':'')+'>'+esc(p)+'</option>'}).join('');
}
function toggleTheme(){
  var isDark=document.documentElement.getAttribute('data-theme')=== 'dark';
  var next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('theme-btn').textContent=isDark?'\u{1F319}':'\u2600\uFE0F';
  localStorage.setItem('flow_theme',next);
}
function initTheme(){
  var t=localStorage.getItem('flow_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-btn').textContent=t==='dark'?'\u2600\uFE0F':'\u{1F319}';
}
function playSound(type){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(type==='add'){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(520,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(780,ctx.currentTime+.12);
      g.gain.setValueAtTime(.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);
      o.start();o.stop(ctx.currentTime+.25);
    } else if(type==='done'){
      [0,.12,.22].forEach(function(t,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';
        o.frequency.value=[523,659,784][i];
        g.gain.setValueAtTime(.16,ctx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
        o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);
      });
    }
  }catch(e){}
}
function launchConfetti(){
  var canvas=document.getElementById('confetti-canvas');
  var ctx2=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  canvas.style.display='block';
  var pieces=[];
  var COLORS=['#2C4E7A','#D42B2B','#F8B500','#0E9057','#8A8FA8','#fff'];
  for(var i=0;i<140;i++){
    pieces.push({x:Math.random()*canvas.width,y:-20-Math.random()*200,w:6+Math.random()*8,h:8+Math.random()*10,color:COLORS[Math.floor(Math.random()*COLORS.length)],vx:(Math.random()-.5)*5,vy:3+Math.random()*5,rot:Math.random()*360,vrot:(Math.random()-.5)*8,opacity:1});
  }
  var frame=0;
  function draw(){
    ctx2.clearRect(0,0,canvas.width,canvas.height);
    var alive=false;
    pieces.forEach(function(p){
      if(p.y>canvas.height+20)return;
      alive=true;
      p.y+=p.vy;p.x+=p.vx;p.rot+=p.vrot;p.vy+=.12;
      if(frame>60)p.opacity=Math.max(0,p.opacity-.015);
      ctx2.save();ctx2.globalAlpha=p.opacity;
      ctx2.translate(p.x,p.y);ctx2.rotate(p.rot*Math.PI/180);
      ctx2.fillStyle=p.color;
      ctx2.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx2.restore();
    });
    frame++;
    if(alive&&frame<180)requestAnimationFrame(draw);
    else{ctx2.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  draw();
}
function renderNav(){
  document.getElementById('bases-bar').innerHTML=DB.bases.map(function(b){return '<button class="btab'+(b.id===curBase?' on':'')+'" onclick="selBase(\''+ b.id+'\')"><span class="bdot" style="background:'+esc(b.color)+'"></span>'+esc(b.name)+'<span class="bct">'+bTasks(b.id).length+'</span></button>'}).join('')+'<button class="badd" onclick="openNewBase()">+ Base</button>';
}
function selBase(id){curBase=id;document.getElementById('srch').value='';document.getElementById('fp').value='';renderNav();applyF()}
function render(){
  var ft=filtered();updStats(ft);
  if(!curBase){document.getElementById('main').innerHTML='<div class="empty"><div class="empty-ico">&#128194;</div><div class="empty-t">Selecione uma base</div><div class="empty-d">Escolha uma base acima ou crie uma nova.</div></div>';return}
  if(curView==='k')renderKanban(ft);else renderList(ft);
}
function updStats(ft){
  var done=ft.filter(function(t){return t.status==='Concluido'}).length;
  var doing=ft.filter(function(t){return t.status==='Em andamento'}).length;
  var late=ft.filter(function(t){return t.due&&new Date(t.due+'T00:00:00')<new Date()&&t.status!=='Concluido'}).length;
  document.getElementById('tstats').innerHTML='<div class="tst"><strong>'+ft.length+'</strong> tarefas</div><div class="tst"><strong style="color:var(--green)">'+done+'</strong> ok</div><div class="tst"><strong style="color:var(--brand-blue)">'+doing+'</strong> andamento</div>'+(late?'<div class="tst"><strong style="color:var(--red)">'+late+'</strong> atrasadas</div>':''  );
}
function renderKanban(ft){
  var all=bTasks(curBase);
  var html='<div class="scards"><div class="sc c-blue"><div class="sc-n nb">'+all.length+'</div><div class="sc-l">Total de tarefas</div></div><div class="sc c-green"><div class="sc-n ng">'+all.filter(function(t){return t.status==='Concluido'}).length+'</div><div class="sc-l">Concluidas</div></div><div class="sc c-amber"><div class="sc-n na">'+all.filter(function(t){return t.priority==='Alta'}).length+'</div><div class="sc-l">Alta prioridade</div></div><div class="sc c-red"><div class="sc-n nr">'+all.filter(function(t){return t.due&&new Date(t.due+'T00:00:00')<new Date()&&t.status!=='Concluido'}).length+'</div><div class="sc-l">Atrasadas</div></div></div><div class="kanban">';
  STATUSES.forEach(function(st){
    var cards=ft.filter(function(t){return t.status===st});
    html+='<div class="kol"><div class="kol-hd"><div style="display:flex;align-items:center"><span class="kdot" style="background:'+STCOL[st]+'"></span><span class="kname">'+st+'</span></div><div style="display:flex;align-items:center;gap:5px"><span class="kcnt">'+cards.length+'</span><button class="kplus" onclick="openNewTask(\''+ st+'\')" title="Adicionar">+</button></div></div><div class="kcards">';
    if(!cards.length)html+='<div class="empty-kol">Nenhuma tarefa</div>';
    cards.forEach(function(t){html+=cardHtml(t)});
    html+='</div></div>';
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}
function cardHtml(t){
  var dc=dcls(t.due),dl=dlbl(t.due);
  var pc=t.priority==='Alta'?'cha':t.priority==='Baixa'?'chb':'chm';
  return '<div class="card" onclick="openDetail(\''+ t.id+'\')">'+
    '<div class="card-hd"><div class="card-title">'+esc(t.title)+'</div>'+
    '<div class="cacts"><button class="ca" onclick="event.stopPropagation();openEdit(\''+ t.id+'\')" title="Editar">&#9998;</button>'+
    '<button class="ca" onclick="event.stopPropagation();askDel(\''+ t.id+'\')" title="Excluir">&#128465;</button></div></div>'+
    '<div class="card-chips"><span class="chip '+pc+'">'+esc(t.priority)+'</span>'+
    (t.comments&&t.comments.length?'<span class="ccomm">&#128172; '+t.comments.length+'</span>':'')+
    '</div>'+
    '<div class="card-ft">'+
    (t.person?'<div class="cperson"><div class="av" style="background:'+avc(t.person)+'">'+ini(t.person)+'</div>'+esc(t.person)+'</div>':'<div></div>')+
    (dl?'<span class="cdue '+dc+'">'+dl+'</span>':'')+
    '</div>'+
    (t.notes?'<div class="cnotes">'+esc(t.notes.slice(0,72))+(t.notes.length>72?'\u2026':'')+'</div>':'')+
    '</div>';
}
function renderList(ft){
  var groups={};
  ft.forEach(function(t){var g=t.group||'Geral';if(!groups[g])groups[g]=[];groups[g].push(t)});
  var html='';
  if(!Object.keys(groups).length)html='<div class="empty"><div class="empty-ico">&#10024;</div><div class="empty-t">Base vazia</div><div class="empty-d">Crie a primeira tarefa desta base.</div><button class="gbtn gbtn-ac" onclick="openNewTask(null)" style="height:38px;padding:0 20px">+ Criar tarefa</button></div>';
  else Object.keys(groups).sort().forEach(function(g){
    html+='<div class="grp-blk"><div class="grp-hdr" onclick="tglG(this)"><span class="gchev op">&#9658;</span><span class="gname">'+esc(g)+'</span><span class="gcnt">'+groups[g].length+'</span><button class="gbtn" style="margin-left:auto;height:27px;padding:0 11px;font-size:11px;border-radius:40px" onclick="event.stopPropagation();openNewTask(null,\''+ esc(g)+'\')">+ Adicionar</button></div><div class="grp-body"><div class="lwrap"><div class="lhd"><span>Tarefa</span><span>Prioridade</span><span>Responsavel</span><span>Status</span><span>Prazo</span><span></span></div>';
    groups[g].forEach(function(t){
      var dc=dcls(t.due),dl=dlbl(t.due);
      var pc=t.priority==='Alta'?'cha':t.priority==='Baixa'?'chb':'chm';
      var sc2=STCLS[t.status]||'stodo';
      html+='<div class="lrow" onclick="openDetail(\''+ t.id+'\')">'+
        '<div class="ltitle">'+esc(t.title)+'</div>'+
        '<div><span class="chip '+pc+'">'+esc(t.priority)+'</span></div>'+
        '<div>'+(t.person?'<div class="cperson" style="display:inline-flex"><div class="av" style="background:'+avc(t.person)+'">'+ini(t.person)+'</div>'+esc(t.person)+'</div>':'<span style="color:var(--ink3);font-size:11px">&#8212;</span>')+'</div>'+
        '<div><span class="spill '+sc2+'">'+esc(t.status)+'</span></div>'+
        '<div>'+(dl?'<span class="cdue '+dc+'">'+dl+'</span>':'<span style="color:var(--ink3);font-size:11px">&#8212;</span>')+'</div>'+
        '<div style="display:flex;gap:3px" onclick="event.stopPropagation()"><button class="ca" style="opacity:1" onclick="openEdit(\''+ t.id+'\')" title="Editar">&#9998;</button><button class="ca" style="opacity:1" onclick="askDel(\''+ t.id+'\')" title="Excluir">&#128465;</button></div></div>';
    });
    html+='</div></div></div>';
  });
  document.getElementById('main').innerHTML=html;
}
function tglG(h){var b=h.nextElementSibling,c=h.querySelector('.gchev');b.style.display=b.style.display==='none'?'':'none';c.classList.toggle('op')}
function setView(v){curView=v;document.getElementById('vp-k').classList.toggle('on',v==='k');document.getElementById('vp-l').classList.toggle('on',v==='l');render()}
function openNewTask(st,gr){
  editId=null;document.getElementById('mtitle').textContent='Nova tarefa';
  document.getElementById('t-ti').value='';document.getElementById('t-st').value=st||'A fazer';
  document.getElementById('t-pr').value='Media';document.getElementById('t-pe').value='';
  document.getElementById('t-du').value='';document.getElementById('t-gr').value=gr||'';
  document.getElementById('t-no').value='';
  openOv('ov-task');setTimeout(function(){document.getElementById('t-ti').focus()},110);
}
function openEdit(id){
  var t=DB.tasks.find(function(t){return t.id===id});if(!t)return;
  editId=id;document.getElementById('mtitle').textContent='Editar tarefa';
  document.getElementById('t-ti').value=t.title;document.getElementById('t-st').value=t.status;
  document.getElementById('t-pr').value=t.priority;document.getElementById('t-pe').value=t.person||'';
  document.getElementById('t-du').value=t.due||'';document.getElementById('t-gr').value=t.group||'';
  document.getElementById('t-no').value=t.notes||'';
  closeOv('ov-detail');openOv('ov-task');setTimeout(function(){document.getElementById('t-ti').focus()},110);
}
function saveTask(){
  var ti=document.getElementById('t-ti').value.trim();
  if(!ti){document.getElementById('t-ti').style.borderColor='#C42828';return}
  document.getElementById('t-ti').style.borderColor='';
  var isNew=!editId;
  var prevTask=editId?DB.tasks.find(function(t){return t.id===editId}):null;
  var prevStatus=prevTask?prevTask.status:null;
  var newStatus=document.getElementById('t-st').value;
  var d={id:editId||uid(),base:curBase,title:ti,status:newStatus,
    priority:document.getElementById('t-pr').value,person:document.getElementById('t-pe').value.trim(),
    due:document.getElementById('t-du').value,group:document.getElementById('t-gr').value.trim(),
    notes:document.getElementById('t-no').value.trim(),
    createdAt:editId&&prevTask?(prevTask.createdAt||new Date().toISOString()):new Date().toISOString(),
    updatedAt:new Date().toISOString(),
    comments:editId&&prevTask?(prevTask.comments||[]):[]
  };
  if(editId){var idx=DB.tasks.findIndex(function(t){return t.id===editId});if(idx>-1)DB.tasks[idx]=d}else DB.tasks.unshift(d);
  save();closeOv('ov-task');renderNav();applyF();
  if(isNew){playSound('add')}
  else if(prevStatus!=='Concluido'&&newStatus==='Concluido'){playSound('done');launchConfetti()}
}
function openDetail(id){
  var t=DB.tasks.find(function(t){return t.id===id});if(!t)return;
  var dc=dcls(t.due),dl=dlbl(t.due);
  var pc=t.priority==='Alta'?'cha':t.priority==='Baixa'?'chb':'chm';
  var sc2=STCLS[t.status]||'stodo';
  var comms=t.comments||[];
  var cH=comms.length?comms.map(function(c){return '<div class="comm"><div class="comm-au">'+esc(c.author)+'</div><div class="comm-tx">'+esc(c.text)+'</div><div class="comm-ti">'+new Date(c.at).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+'</div></div>'}).join(''): '<div style="font-size:11px;color:var(--ink3)">Nenhum comentario ainda.</div>';
  document.getElementById('dpanel').innerHTML=
    '<div class="dphd"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'+
    '<div class="dptitle">'+esc(t.title)+'</div>'+
    '<button class="mclose" onclick="closeOv(\'ov-detail\')">&#10005;</button></div>'+
    '<div class="dpbadges"><span class="spill '+sc2+'">'+esc(t.status)+'</span><span class="chip '+pc+'">'+esc(t.priority)+'</span>'+(dl?'<span class="cdue '+dc+'">'+dl+'</span>':'')+
    '</div></div><div class="dpbody">'+
    '<div class="dpsec"><div class="dpst">Detalhes</div>'+
    (t.person?'<div class="dprow"><span class="dplbl">Responsavel</span><span style="display:flex;align-items:center;gap:6px"><div class="av" style="background:'+avc(t.person)+'">'+ini(t.person)+'</div>'+esc(t.person)+'</span></div>':'')+
    (t.due?'<div class="dprow"><span class="dplbl">Prazo</span><span>'+new Date(t.due+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'long'})+'</span></div>':'')+
    (t.group?'<div class="dprow"><span class="dplbl">Grupo</span><span>'+esc(t.group)+'</span></div>':'')+
    '<div class="dprow"><span class="dplbl">Criado em</span><span>'+new Date(t.createdAt).toLocaleDateString('pt-BR')+'</span></div></div>'+
    (t.notes?'<div class="dpsec"><div class="dpst">Anotacoes</div><div class="dpnote">'+esc(t.notes)+'</div></div>':'')+
    '<div class="dpsec"><div class="dpst">Comentarios ('+comms.length+')</div>'+
    '<div class="comms" id="dpc-'+id+'">'+cH+'</div>'+
    '<div class="cadd"><input type="text" id="cn-'+id+'" placeholder="Seu nome" style="max-width:118px"><input type="text" id="ct-'+id+'" placeholder="Escreva um comentario..."><button class="gbtn gbtn-ac" style="height:32px;padding:0 12px;font-size:12px;white-space:nowrap" onclick="addComm(\''+ id+'\')">Enviar</button></div></div></div>'+
    '<div class="dpft"><button class="gbtn gbtn-ac" onclick="openEdit(\''+ id+'\')">&#9998; Editar</button><button class="gbtn" onclick="closeOv(\'ov-detail\')">Fechar</button><button class="gbtn gbtn-dl" style="margin-left:auto" onclick="closeOv(\'ov-detail\');askDel(\''+ id+'\')">&#128465; Excluir</button></div>';
  openOv('ov-detail');
}
function addComm(id){
  var na=document.getElementById('cn-'+id),te=document.getElementById('ct-'+id);
  if(!na||!na.value.trim()||!te||!te.value.trim())return;
  var t=DB.tasks.find(function(t){return t.id===id});if(!t)return;
  if(!t.comments)t.comments=[];
  t.comments.push({id:uid(),author:na.value.trim(),text:te.value.trim(),at:new Date().toISOString()});
  save();
  var c=document.getElementById('dpc-'+id);
  if(c)c.innerHTML=t.comments.map(function(cc){return '<div class="comm"><div class="comm-au">'+esc(cc.author)+'</div><div class="comm-tx">'+esc(cc.text)+'</div><div class="comm-ti">'+new Date(cc.at).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+'</div></div>'}).join('');
  te.value='';render();renderNav();
}
function askDel(id){delId=id;openOv('ov-confirm')}
function doDelete(){if(!delId)return;DB.tasks=DB.tasks.filter(function(t){return t.id!==delId});delId=null;save();closeOv('ov-confirm');closeOv('ov-detail');renderNav();applyF()}
function openNewBase(){
  selColor=BCOLORS[Math.floor(Math.random()*BCOLORS.length)];
  document.getElementById('nb-name').value='';
  document.getElementById('cpick').innerHTML=BCOLORS.map(function(c){return '<div class="copt'+(c===selColor?' sel':'')+'" style="background:'+c+'" onclick="pickC(\''+ c+'\',this)"></div>'}).join('');
  openOv('ov-newbase');setTimeout(function(){document.getElementById('nb-name').focus()},110);
}
function pickC(c,el){selColor=c;document.querySelectorAll('.copt').forEach(function(e){e.classList.remove('sel')});el.classList.add('sel')}
function createBase(){
  var name=document.getElementById('nb-name').value.trim();
  if(!name){document.getElementById('nb-name').style.borderColor='#C42828';return}
  document.getElementById('nb-name').style.borderColor='';
  var b={id:uid(),name:name,color:selColor};DB.bases.push(b);save();closeOv('ov-newbase');selBase(b.id);
  playSound('add');
}
function openOv(id){document.getElementById(id).classList.add('open')}
function closeOv(id){document.getElementById(id).classList.remove('open')}
['ov-task','ov-detail','ov-confirm','ov-newbase'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeOv(id)});
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')['ov-task','ov-detail','ov-confirm','ov-newbase'].forEach(closeOv)});
